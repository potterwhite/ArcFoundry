project:
  name: "rvm-rk3588"
  output_dir: "./output/rk3588_release"
  workspace_dir: "./workspace/tmp"

target:
  platform: "rk3588"
  # device_id: null

build:
  # Optimization Level (0-3): Controls the aggressiveness of graph fusion.
  # 0: Off / Debug. No optimization. Compiles the graph "as-is". Highest stability for sensitive ops (Div/Softmax) but slowest speed.
  # 1: Safe. Enables only basic and safe fusions. Good starting point if the default level causes accuracy issues.
  # 2: Balanced. Standard optimizations suitable for most CV models.
  # 3: Aggressive (Default). Max performance. Complex operator fusion. May cause accuracy drop in Transformer/Conformer models due to aggressive merging.
  optimization_level: 2
  verbose: true
  pruning: false
  eval_memory: false

  quantization:
    enabled: false
    dtype: "asymmetric_quantized-8"
    dataset: "./data/calibration_list.txt"
    sampling_interval: 5           # Use every 5th sample from the dataset for calibration

models:
  - name: "rvm"
    path: "models/downloads/rvm_mobilenetv3.onnx"
    # -------
    # Original ONNX from MODNet Author
    # url: "https://huggingface.co/PotterWhite/MODNet/resolve/main/photographic/modnet_photographic_portrait_matting.onnx"
    # -------
    # InstanceNormalization Folded ONNX model
    url: "https://github.com/PeterL1n/RobustVideoMatting/releases/download/v1.0.0/rvm_mobilenetv3_fp32.onnx"
    preprocess:
      fix_dynamic_shape:
        enabled: true
        strict_override: true
      fold_constant_inputs:
        enabled: true
        inputs:
          # downsample_ratio controls RVM's internal resize scale.
          # Fixed to 0.25: 288x512 src -> 72x128 processing resolution.
          # Change this value when switching input resolution (keep dr * H/W = NPU res).
          downsample_ratio: [0.25]
      fix_int64_type: false
      simplify: true          # Required: folds Shape→Slice→Concat chains downstream of downsample_ratio
      extract_metadata: true
    normalization:
      mean_values: [[0, 0, 0]]
      std_values: [[255, 255, 255]]
    input_shapes:
      # --- Primary input ---
      # RVM src input. downsample_ratio=0.25 means internal processing at 72x128.
      src: [1, 3, 288, 512]
      # --- ConvGRU recurrent states (shapes verified via onnxruntime, dr=0.25) ---
      # r*o shapes from: sess.run(..., downsample_ratio=[0.25]) on 288x512 input
      r1i: [1, 16, 36, 64]
      r2i: [1, 20, 18, 32]
      r3i: [1, 40, 9, 16]
      r4i: [1, 64, 5, 8]
      # -----------------
      # Alternative resolutions (update r*i shapes accordingly):
      # src: [1, 3, 256, 256]  # dr=0.25 -> r1i:[1,16,32,32] r2i:[1,20,16,16] r3i:[1,40,8,8] r4i:[1,64,4,4]
      # src: [1, 3, 576, 1024] # dr=0.25 -> multiply all r*i H/W by 2x vs 288x512
