project:
  name: "modnet-rk3588"
  output_dir: "./output/rk3588_release"
  workspace_dir: "./workspace/tmp"

target:
  platform: "rk3588"
  # device_id: null

build:
  # Optimization Level (0-3): Controls the aggressiveness of graph fusion.
  # 0: Off / Debug. No optimization. Compiles the graph "as-is". Highest stability for sensitive ops (Div/Softmax) but slowest speed.
  # 1: Safe. Enables only basic and safe fusions. Good starting point if the default level causes accuracy issues.
  # 2: Balanced. Standard optimizations suitable for most CV models.
  # 3: Aggressive (Default). Max performance. Complex operator fusion. May cause accuracy drop in Transformer/Conformer models due to aggressive merging.
  optimization_level: 2
  verbose: true
  pruning: false
  eval_memory: false

  quantization:
    enabled: false
    dtype: "asymmetric_quantized-8"
    dataset: "./data/calibration_list.txt"
    sampling_interval: 5           # Use every 5th sample from the dataset for calibration

models:
  - name: "modnet"
    path: "models/downloads/modnet_photographic_portrait_matting.onnx"
    # -------
    # Original ONNX from MODNet Author
    # url: "https://huggingface.co/PotterWhite/MODNet/resolve/main/photographic/modnet_photographic_portrait_matting.onnx"
    # -------
    # InstanceNormalization Folded ONNX model
    url: "https://huggingface.co/PotterWhite/MODNet/resolve/main/photographic/modnet_photographic_portrait_matting_in_folded.onnx"
    preprocess:
      fix_dynamic_shape:
        enabled: true
        strict_override: true
      simplify: true
      extract_metadata: true
    normalization:
      mean_values: [[127.5, 127.5, 127.5]]
      std_values: [[127.5, 127.5, 127.5]]
    input_shapes:
      # -----------------
      # Test: 256*256=65536 < 88064
      # Mar11.2026: <60ms 3NPU |
      # input: [1, 3, 256, 256]
      # -----------------
      # input: [1, 3, 384, 384]
      # -----------------
      # Mar11.2026: <
      # input: [1, 3, 288, 512]
      # -----------------
      # input: [1, 3, 384, 672]    # 270ms 2STARTS-CLEAR-STRANDS
      # -----------------
      #input: [1, 3, 448, 800]  # <540ms 2STARTS-CLEAR-STRANDS 7CPU-TRANSPOSES
      # ---------------
      # Mar05.2026: <936ms 68/178/188/198/208/219/231-7CPU-TRANSPOSES
      # Mar11.2026: <571ms SingleNPU / Serialize Inferencing
      input: [1, 3, 576, 1024]
      # -----------------
      #input: [1, 3, 864, 1536]  # 2334ms 68/79/86/97/134/146/156/166/178/188/198/208/219/231-14CPU-TRANSPOSES
      # -----------------
      #input: [1, 3, 512, 512]  # Fixed 512x512 size for optimal NPU multi-core scheduling.
                          # Non-standard sizes like 512x896 cause multi-core scheduling failures,
                          # forcing layers to run on single core instead of 3-core parallel mode.
