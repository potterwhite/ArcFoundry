# Configuration: rk3588s_rvm_mobilenetv3_fp16_1080x1920_0.75-dsr
# Resolution: 1080x1920
# Downsample Ratio: 0.75
# Precision: fp16
# Has Refiner: True
#
# Changelog:
#   2026-06-03: Unified optimization settings (s5_8_22_15)
#     - optimization_level: 2 → 3 (aggressive graph fusion)
#     - pruning: false → true (enable graph pruning)
#     - Added graph_surgery: outputs.modify (remove DeepGuidedFilterRefiner)
#     - Standardized naming: removed oplv3/no-resize suffixes
#     - Added dsr suffix to all configs for clarity
#
# Notes:
#   - graph_surgery removes Resize×2 + element-wise tail from refiner
#   - NPU outputs A(4ch, low-res) + b(4ch, low-res) instead of fgr+pha
#   - C++ Postprocess performs guided filter combination
#   - Expected NPU saving: ~34ms (-28%)

project:
  name: "rvm_mobilenetv3_fp16_1080x1920_0.75-dsr_rk3588s_20260603"
  output_dir: "./output/rvm_mobilenetv3_fp16_1080x1920_0.75-dsr_rk3588s_20260603_release"
  workspace_dir: "./workspace/tmp"

target:
  platform: "rk3588"

build:
  optimization_level: 3
  verbose: true
  pruning: true
  eval_memory: false

  quantization:
    enabled: false
    dtype: "asymmetric_quantized-8"
    dataset: "./data/calibration_list.txt"
    sampling_interval: 5

models:
  - name: "rvm_mobilenetv3_fp16_1080x1920_0.75-dsr_rk3588s_20260603_rk3588"
    path: "models/downloads/rvm_mobilenetv3.onnx"
    url: "https://github.com/PeterL1n/RobustVideoMatting/releases/download/v1.0.0/rvm_mobilenetv3_fp32.onnx"
    preprocess:
      fix_dynamic_shape:
        enabled: true
        strict_override: true
      fold_constant_inputs:
        enabled: true
        inputs:
          downsample_ratio: [0.75]     # ← 关键变化
      graph_surgery:
        enabled: true
        outputs:
          modify:
            - existing: "fgr"        # ONNX graph output tensor name
              replacement: "777"     # Conv_316 output (refiner A, 4ch, low-res)
            - existing: "pha"        # ONNX graph output tensor name
              replacement: "779"     # Sub_318 output (refiner b, 4ch, low-res)
      fix_int64_type: false
      simplify: true
      extract_metadata: true
    normalization:
      mean_values: [[0, 0, 0]]
      std_values: [[255, 255, 255]]
    input_shapes:
      src: [1, 3, 1080, 1920]
      # dH = round(1080 * 0.75) = 810, dW = round(1920 * 0.75) = 1440
      # r1: stride-2  → ceil(810/2)=405,  ceil(1440/2)=720
      # r2: stride-4  → ceil(810/4)=203,  ceil(1440/4)=360
      # r3: stride-8  → ceil(810/8)=102,  ceil(1440/8)=180
      # r4: stride-16 → ceil(810/16)=51,  ceil(1440/16)=90
      r1i: [1, 16, 405, 720]
      r2i: [1, 20, 203, 360]
      r3i: [1, 40, 102, 180]
      r4i: [1, 64,  51,  90]