# INT8 实验：1080p src, dsr=0.25, INT8 量化
# 测试 INT8 量化对 alpha 质量的累积影响

project:
  name: "rvm_mobilenetv3_int8_1080x1920_rk3588"
  output_dir: "./output/rvm_mobilenetv3_int8_1080x1920_rk3588_release"
  workspace_dir: "./workspace/tmp"

target:
  platform: "rk3588"

build:
  optimization_level: 2
  verbose: true
  pruning: false
  eval_memory: false

  quantization:
    enabled: true              # ← INT8 量化
    dtype: "asymmetric_quantized-8"
    dataset: "./data/calibration_int8_200items.txt"
    sampling_interval: 5

models:
  - name: "rvm_mobilenetv3_int8_1080x1920_rk3588"
    path: "models/downloads/rvm_mobilenetv3.onnx"
    url: "https://github.com/PeterL1n/RobustVideoMatting/releases/download/v1.0.0/rvm_mobilenetv3_fp32.onnx"
    preprocess:
      fix_dynamic_shape:
        enabled: true
        strict_override: true
      fold_constant_inputs:
        enabled: true
        inputs:
          downsample_ratio: [0.25]
      fix_int64_type: false
      simplify: true
      extract_metadata: true
    normalization:
      mean_values: [[0, 0, 0]]
      std_values: [[255, 255, 255]]
    input_shapes:
      src: [1, 3, 1080, 1920]
      r1i: [1, 16, 135, 240]
      r2i: [1, 20,  68, 120]
      r3i: [1, 40,  34,  60]
      r4i: [1, 64,  17,  30]