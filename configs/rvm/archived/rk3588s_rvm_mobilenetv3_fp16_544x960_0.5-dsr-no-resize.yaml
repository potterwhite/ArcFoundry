# s5_8_22_14 — RVM no-resize variant (graph_surgery integrated)
# Removes DeepGuidedFilterRefiner Resize×2 + element-wise tail via graph_surgery.
# Uses original ONNX model; surgery is done in preprocess pipeline.
# NPU outputs A(4ch,272×480) + b(4ch,272×480) instead of fgr + pha.
# C++ Postprocess performs guided filter combination (see s5_8_22_12).
# Expected NPU saving: ~34ms (-28%).

project:
  name: "rvm_mobilenetv3_fp16_544x960_0.5-dsr-no-resize"
  output_dir: "./output/rvm_mobilenetv3_fp16_544x960_0.5-dsr-no-resize_rk3588_release"
  workspace_dir: "./workspace/tmp"

target:
  platform: "rk3588"

build:
  optimization_level: 3
  verbose: true
  pruning: true
  eval_memory: false
  quantization:
    enabled: false
    dtype: "asymmetric_quantized-8"
    dataset: "./data/calibration_list.txt"
    sampling_interval: 5

models:
  - name: "rvm_mobilenetv3_fp16_544x960_0.5-dsr-no-resize_rk3588"
    path: "models/downloads/rvm_mobilenetv3.onnx"
    url: "https://github.com/PeterL1n/RobustVideoMatting/releases/download/v1.0.0/rvm_mobilenetv3_fp32.onnx"
    preprocess:
      fix_dynamic_shape:
        enabled: true
        strict_override: true
      fold_constant_inputs:
        enabled: true
        inputs:
          downsample_ratio: [0.5]
      graph_surgery:
        enabled: true
        outputs:
          modify:
            - existing: "fgr"        # ONNX graph output tensor name
              replacement: "777"     # Conv_316 output (refiner A, 4ch, 272×480)
            - existing: "pha"        # ONNX graph output tensor name
              replacement: "779"     # Sub_318 output (refiner b, 4ch, 272×480)
      fix_int64_type: false
      simplify: true
      extract_metadata: true
    normalization:
      mean_values: [[0, 0, 0]]
      std_values: [[255, 255, 255]]
    input_shapes:
      src: [1, 3, 544, 960]
      r1i: [1, 16, 136, 240]
      r2i: [1, 20, 68, 120]
      r3i: [1, 40, 34, 60]
      r4i: [1, 64, 17, 30]
