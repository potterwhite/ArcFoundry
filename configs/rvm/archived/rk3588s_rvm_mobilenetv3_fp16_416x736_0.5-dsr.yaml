# MR2-P5 §35 — dsr=0.5 compensation test (s35)
# r-state: 470,752 elements (1.80 MB)
# dH = round(416*0.5) = 208, dW = round(736*0.5) = 368

project:
  name: "rvm_mobilenetv3_fp16_416x736_rk3588_0.5-dsr"
  output_dir: "./output/rvm_mobilenetv3_fp16_416x736_0.5-dsr_rk3588_release"
  workspace_dir: "./workspace/tmp"

target:
  platform: "rk3588"

build:
  optimization_level: 2
  verbose: true
  pruning: false
  eval_memory: false
  quantization:
    enabled: false
    dtype: "asymmetric_quantized-8"
    dataset: "./data/calibration_list.txt"
    sampling_interval: 5

models:
  - name: "rvm_mobilenetv3_fp16_416x736_0.5-dsr_rk3588"
    path: "models/downloads/rvm_mobilenetv3.onnx"
    url: "https://github.com/PeterL1n/RobustVideoMatting/releases/download/v1.0.0/rvm_mobilenetv3_fp32.onnx"
    preprocess:
      fix_dynamic_shape:
        enabled: true
        strict_override: true
      fold_constant_inputs:
        enabled: true
        inputs:
          downsample_ratio: [0.5]
      fix_int64_type: false
      simplify: true
      extract_metadata: true
    normalization:
      mean_values: [[0, 0, 0]]
      std_values: [[255, 255, 255]]
    input_shapes:
      src: [1, 3, 416, 736]
      r1i: [1, 16, 104, 184]
      r2i: [1, 20, 52, 92]
      r3i: [1, 40, 26, 46]
      r4i: [1, 64, 13, 23]
