# r-state: 799,680 elements (3.05 MB)
# dH = round(544*0.5) = 272, dW = round(960*0.5) = 480

project:
  name: "rvm_mobilenetv3_fp16_544x960_rk3588_0.5-dsr-oplv3"
  output_dir: "./output/rvm_mobilenetv3_fp16_544x960_0.5-dsr-oplv3_rk3588_release"
  workspace_dir: "./workspace/tmp"

target:
  platform: "rk3588"

build:
  optimization_level: 3
  verbose: true
  pruning: true
  eval_memory: false
  quantization:
    enabled: false
    dtype: "asymmetric_quantized-8"
    dataset: "./data/calibration_list.txt"
    sampling_interval: 5

models:
  - name: "rvm_mobilenetv3_fp16_544x960_0.5-dsr-oplv3_rk3588"
    path: "models/downloads/rvm_mobilenetv3.onnx"
    url: "https://github.com/PeterL1n/RobustVideoMatting/releases/download/v1.0.0/rvm_mobilenetv3_fp32.onnx"
    preprocess:
      fix_dynamic_shape:
        enabled: true
        strict_override: true
      fold_constant_inputs:
        enabled: true
        inputs:
          downsample_ratio: [0.5]
      fix_int64_type: false
      simplify: true
      extract_metadata: true
    normalization:
      mean_values: [[0, 0, 0]]
      std_values: [[255, 255, 255]]
    input_shapes:
      src: [1, 3, 544, 960]
      r1i: [1, 16, 136, 240]
      r2i: [1, 20, 68, 120]
      r3i: [1, 40, 34, 60]
      r4i: [1, 64, 17, 30]
