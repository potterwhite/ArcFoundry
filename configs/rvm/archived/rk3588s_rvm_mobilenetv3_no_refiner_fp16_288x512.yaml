# Round 2 RVM Phase-5 §12: No-Refiner FP16 RKNN conversion config
# Purpose: A/B 对比实验 — 量化 FastGuidedFilterRefiner 对 RKNN pha 偏差的贡献
#
# Source model: rvm_mobilenetv3_fp32_no_refiner.onnx (opset 12, 15MB, 337 nodes)
# Difference vs original: 去掉 FastGuidedFilterRefiner，其余（backbone/ASPP/decoder/projection）不变
# PC 端验证: no-refiner vs PyTorch mean_diff=0.60, bg_ratio diff=0.2% (视觉等价)
#
# Expected RKNN graph: ~337 nodes (vs 含 Refiner 的 353 nodes, 减少 16 个算子)
# Input/output interface: 与含 Refiner 模型完全一致（src, r1i~r4i → fgr, pha, r1o~r4o）
#
# Ref: PKB log-MR2-P5-rknn-inference.md §12

project:
  name: "rvm_mobilenetv3_no_refiner_fp16_288x512_rk3588"
  output_dir: "./output/rvm_mobilenetv3_no_refiner_fp16_288x512_rk3588"
  workspace_dir: "./workspace/tmp"

target:
  platform: "rk3588"

build:
  optimization_level: 2
  verbose: true
  pruning: false
  eval_memory: false

  quantization:
    enabled: false          # FP16
    dtype: "asymmetric_quantized-8"
    dataset: "./data/calibration_list.txt"
    sampling_interval: 5

models:
  - name: "rvm_mobilenetv3_no_refiner_fp16_288x512_rk3588"
    path: "models/downloads/rvm_mobilenetv3_no_refiner.onnx"
    url: null               # 本地文件，不从网络下载
    # Model properties:
    #   - opset 12, 337 nodes, 15MB FP32
    #   - 无 Refiner（FastGuidedFilterRefiner 已跳过）
    #   - backbone/ASPP/decoder/projection 与原模型完全一致
    #   - 输出分辨率由 bilinear interpolate 上采样（替代 Refiner 的上采样）
    preprocess:
      fix_dynamic_shape:
        enabled: true
        strict_override: true
      fold_constant_inputs:
        enabled: true
        inputs:
          downsample_ratio: [0.25]
      fix_int64_type: false
      simplify: true
      extract_metadata: true
    normalization:
      mean_values: [[0, 0, 0]]
      std_values: [[255, 255, 255]]
    input_shapes:
      src: [1, 3, 288, 512]
      r1i: [1, 16, 36, 64]
      r2i: [1, 20, 18, 32]
      r3i: [1, 40,  9, 16]
      r4i: [1, 64,  5,  8]
