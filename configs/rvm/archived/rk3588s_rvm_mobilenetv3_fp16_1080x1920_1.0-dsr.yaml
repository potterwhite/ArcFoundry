# dsr=1.0 实验：1080p src → 1080p 内部处理分辨率（无降采样，理论质量上限）

project:
  name: "rvm_mobilenetv3_fp16_1080x1920_dsr10_rk3588"
  output_dir: "./output/rvm_mobilenetv3_fp16_1080x1920_dsr10_rk3588_release"
  workspace_dir: "./workspace/tmp"

target:
  platform: "rk3588"

build:
  optimization_level: 2
  verbose: true
  pruning: false
  eval_memory: false

  quantization:
    enabled: false
    dtype: "asymmetric_quantized-8"
    dataset: "./data/calibration_list.txt"
    sampling_interval: 5

models:
  - name: "rvm_mobilenetv3_fp16_1080x1920_dsr10_rk3588"
    path: "models/downloads/rvm_mobilenetv3.onnx"
    url: "https://github.com/PeterL1n/RobustVideoMatting/releases/download/v1.0.0/rvm_mobilenetv3_fp32.onnx"
    preprocess:
      fix_dynamic_shape:
        enabled: true
        strict_override: true
      fold_constant_inputs:
        enabled: true
        inputs:
          downsample_ratio: [1.0]      # ← 无降采样
      fix_int64_type: false
      simplify: true
      extract_metadata: true
    normalization:
      mean_values: [[0, 0, 0]]
      std_values: [[255, 255, 255]]
    input_shapes:
      src: [1, 3, 1080, 1920]
      # dH = round(1080 * 1.0) = 1080, dW = round(1920 * 1.0) = 1920
      # r1: stride-2  → ceil(1080/2)=540,  ceil(1920/2)=960
      # r2: stride-4  → ceil(1080/4)=270,  ceil(1920/4)=480
      # r3: stride-8  → ceil(1080/8)=135,  ceil(1920/8)=240
      # r4: stride-16 → ceil(1080/16)=68,  ceil(1920/16)=120
      r1i: [1, 16, 540, 960]
      r2i: [1, 20, 270, 480]
      r3i: [1, 40, 135, 240]
      r4i: [1, 64,  68, 120]