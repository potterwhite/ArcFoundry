#
# Configuration: rvm_mobilenetv3_no_refiner_fp16_288x512_0.25-dsr_rk3588s_20260603
# Resolution: 288x512
# Downsample Ratio: 0.25
# Precision: fp16
# Has Refiner: False
#
# Changelog:
#   2026-06-03: Unified optimization settings (s5_8_22_15)
#     - optimization_level: 2 → 3 (aggressive graph fusion)
#     - pruning: false → true (enable graph pruning)
#     - Standardized naming: removed oplv3/no-resize suffixes
#     - Added dsr suffix to all configs for clarity
#
# Notes:
#   - This is a no-refiner variant (FastGuidedFilterRefiner removed from model)
#   - Output: fgr + pha (standard RVM output, not A+b)
#   - graph_surgery not applicable (no refiner to remove)

project:
  name: "rvm_mobilenetv3_no_refiner_fp16_288x512_0.25-dsr_rk3588s_20260603"
  output_dir: "./output/rvm_mobilenetv3_no_refiner_fp16_288x512_0.25-dsr_rk3588s_20260603_release"
  workspace_dir: "./workspace/tmp"

target:
  platform: "rk3588"

build:
  optimization_level: 3
  verbose: true
  pruning: true
  eval_memory: false

  quantization:
    enabled: false          # FP16
    dtype: "asymmetric_quantized-8"
    dataset: "./data/calibration_list.txt"
    sampling_interval: 5

models:
  - name: "rvm_mobilenetv3_no_refiner_fp16_288x512_0.25-dsr_rk3588s_20260603_rk3588"
    path: "models/downloads/rvm_mobilenetv3_no_refiner.onnx"
    url: "https://huggingface.co/PotterWhite/MODNet/resolve/model%2Frvm/RobustVideoMatting/onnx/rvm_mobilenetv3_fp32_no_refiner.onnx"
    # Model properties:
    #   - opset 12, 337 nodes, 15MB FP32
    #   - 无 Refiner（FastGuidedFilterRefiner 已跳过）
    #   - backbone/ASPP/decoder/projection 与原模型完全一致
    #   - 输出分辨率由 bilinear interpolate 上采样（替代 Refiner 的上采样）
    preprocess:
      fix_dynamic_shape:
        enabled: true
        strict_override: true
      fold_constant_inputs:
        enabled: true
        inputs:
          downsample_ratio: [0.25]
      fix_int64_type: false
      simplify: true
      extract_metadata: true
    normalization:
      mean_values: [[0, 0, 0]]
      std_values: [[255, 255, 255]]
    input_shapes:
      src: [1, 3, 288, 512]
      r1i: [1, 16, 36, 64]
      r2i: [1, 20, 18, 32]
      r3i: [1, 40,  9, 16]
      r4i: [1, 64,  5,  8]
