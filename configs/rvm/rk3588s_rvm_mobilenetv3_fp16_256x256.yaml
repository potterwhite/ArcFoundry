# Round 2 RVM Phase-2 Block 2.5: FP16 RKNN conversion config for RVM MobileNetV3 @ 256x256
# Source model: rvm_mobilenetv3_fp32.onnx (opset 12, 14.3MB, 0 InstanceNorm, no refiner)
# Parent config: rk3588s_rvm_mobilenetv3_fp16.yaml (288x512)
#
# Processing resolution: dH=ceil(256*0.25)=64, dW=ceil(256*0.25)=64
# r*i shapes: all divisible by their stride (64/2=32, 64/4=16, 64/8=8, 64/16=4) — no ceil issues
#
# Benchmark target: < 40ms @ 256x256 FP16 (Phase-2 Block 2.5 goal)

project:
  name: "rvm_mobilenetv3_fp16_256x256_rk3588"
  output_dir: "./output/rvm_mobilenetv3_fp16_256x256_rk3588_release"
  workspace_dir: "./workspace/tmp"

target:
  platform: "rk3588"

build:
  optimization_level: 2
  verbose: true
  pruning: false
  eval_memory: false

  quantization:
    enabled: false
    dtype: "asymmetric_quantized-8"
    dataset: "./data/calibration_list.txt"
    sampling_interval: 5

models:
  - name: "rvm_mobilenetv3_fp16_256x256"
    path: "models/downloads/rvm_mobilenetv3.onnx"
    url: "https://github.com/PeterL1n/RobustVideoMatting/releases/download/v1.0.0/rvm_mobilenetv3_fp32.onnx"
    preprocess:
      fix_dynamic_shape:
        enabled: true
        strict_override: true
      fold_constant_inputs:
        enabled: true
        inputs:
          # downsample_ratio=0.25: 256x256 src → 64x64 processing resolution
          downsample_ratio: [0.25]
      fix_int64_type: false
      simplify: true
      extract_metadata: true
    normalization:
      mean_values: [[0, 0, 0]]
      std_values: [[255, 255, 255]]
    input_shapes:
      # --- Primary input ---
      src: [1, 3, 256, 256]
      # --- ConvGRU recurrent states ---
      # Processing resolution: dH=dW=64 (256*0.25=64, exact integer)
      # r1: stride-2  → 64/2=32,  64/2=32   (exact, no ceil issue)
      # r2: stride-4  → 64/4=16,  64/4=16   (exact)
      # r3: stride-8  → 64/8=8,   64/8=8    (exact)
      # r4: stride-16 → 64/16=4,  64/16=4   (exact, unlike 288x512 where ceil(72/16)=5)
      r1i: [1, 16, 32, 32]
      r2i: [1, 20, 16, 16]
      r3i: [1, 40,  8,  8]
      r4i: [1, 64,  4,  4]
