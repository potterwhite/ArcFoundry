# Configuration: rvm_mobilenetv3_int8_416x736_0.5-dsr_rk3588s_20260605
# Resolution: 416x736
# Downsample Ratio: 0.5
# Precision: int8 (with auto hybrid recovery)
# Has Refiner: True
#
# Changelog:
#   2026-06-05: Created for s5_8_22_16 INT8 hybrid quantization research
#     - Based on fp16_416x736_0.5-dsr config
#     - INT8 quantization with auto hybrid recovery (score < 0.99 → auto-patch)
#     - Calibration: 200 P3M-10k images (calibration_int8_200items.txt)
#
# Notes:
#   - graph_surgery removes Resize×2 + element-wise tail from refiner
#   - NPU outputs A(4ch, low-res) + b(4ch, low-res) instead of fgr+pha
#   - C++ Postprocess performs guided filter combination
#   - Expected NPU saving: ~34ms (-28%)

project:
  name: "rvm_mobilenetv3_int8_416x736_0.5-dsr_rk3588s_20260605"
  output_dir: "./output/rvm_mobilenetv3_int8_416x736_0.5-dsr_rk3588s_20260605_release"
  workspace_dir: "./workspace/tmp"

target:
  platform: "rk3588"

build:
  optimization_level: 3
  verbose: true
  pruning: true
  eval_memory: false

  quantization:
    enabled: true                             # ← INT8 enabled
    dtype: "asymmetric_quantized-8"           # asymmetric INT8 (scale + zero_point)
    dataset: "./data/calibration_int8_200items.txt"
    sampling_interval: 5

models:
  - name: "rvm_mobilenetv3_int8_416x736_0.5-dsr_rk3588s_20260605_rk3588"
    path: "models/downloads/rvm_mobilenetv3.onnx"
    url: "https://github.com/PeterL1n/RobustVideoMatting/releases/download/v1.0.0/rvm_mobilenetv3_fp32.onnx"
    preprocess:
      fix_dynamic_shape:
        enabled: true
        strict_override: true
      fold_constant_inputs:
        enabled: true
        inputs:
          # downsample_ratio=0.5: 416x736 → 208x368 processing resolution
          downsample_ratio: [0.5]
      graph_surgery:
        enabled: true
        outputs:
          modify:
            - existing: "fgr"        # ONNX graph output tensor name
              replacement: "777"     # Conv_316 output (refiner A, 4ch, low-res)
            - existing: "pha"        # ONNX graph output tensor name
              replacement: "779"     # Sub_318 output (refiner b, 4ch, low-res)
      fix_int64_type: false
      simplify: true
      extract_metadata: true
    normalization:
      mean_values: [[0, 0, 0]]
      std_values: [[255, 255, 255]]
    input_shapes:
      # --- Primary input ---
      src: [1, 3, 416, 736]
      # --- ConvGRU recurrent states ---
      # Processing resolution: dH=208 (416*0.5), dW=368 (736*0.5)
      # r1: stride-2  → ceil(208/2)=104,  ceil(368/2)=184
      # r2: stride-4  → ceil(208/4)=52,   ceil(368/4)=92
      # r3: stride-8  → ceil(208/8)=26,   ceil(368/8)=46
      # r4: stride-16 → ceil(208/16)=13,  ceil(368/16)=23
      r1i: [1, 16, 104, 184]
      r2i: [1, 20, 52, 92]
      r3i: [1, 40, 26, 46]
      r4i: [1, 64, 13, 23]
