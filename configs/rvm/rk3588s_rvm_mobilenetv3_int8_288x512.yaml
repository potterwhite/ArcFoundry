# Round 2 RVM Phase-4 Block 4.2: INT8 RKNN conversion config for RVM MobileNetV3 @ 288x512
# Based on: rk3588s_rvm_mobilenetv3_fp16_288x512.yaml (Phase-1/Phase-2)
# Source model: rvm_mobilenetv3_fp32.onnx (opset 12, 14.3MB, 0 InstanceNorm, no refiner)
#
# Quantization: asymmetric INT8, KL divergence calibration
# Calibration: 300 images from P3M-10k train (calibration_list.txt)
#
# FP16 baseline: ~45.7ms @ 288x512 (Phase-2 Block 2.3)
# INT8 target: <35ms @ 288x512 (1.3-1.8x speedup expected)

project:
  name: "rvm_mobilenetv3_int8_288x512_rk3588"
  output_dir: "./output/rvm_mobilenetv3_int8_288x512_rk3588_release"
  workspace_dir: "./workspace/tmp"

target:
  platform: "rk3588"

build:
  optimization_level: 2
  verbose: true
  pruning: false
  eval_memory: false

  quantization:
    enabled: true                             # ← INT8 enabled
    dtype: "asymmetric_quantized-8"           # asymmetric INT8 (scale + zero_point)
    dataset: "./data/calibration_list.txt"    # 300 images from P3M-10k train
    sampling_interval: 5

models:
  - name: "rvm_mobilenetv3_int8_288x512"
    path: "models/downloads/rvm_mobilenetv3.onnx"
    url: "https://github.com/PeterL1n/RobustVideoMatting/releases/download/v1.0.0/rvm_mobilenetv3_fp32.onnx"
    preprocess:
      fix_dynamic_shape:
        enabled: true
        strict_override: true
      fold_constant_inputs:
        enabled: true
        inputs:
          # downsample_ratio=0.25: 288x512 → 72x128 processing resolution
          downsample_ratio: [0.25]
      fix_int64_type: false
      simplify: true
      extract_metadata: true
    normalization:
      mean_values: [[0, 0, 0]]
      std_values: [[255, 255, 255]]
    input_shapes:
      # --- Primary input ---
      src: [1, 3, 288, 512]
      # --- ConvGRU recurrent states ---
      # Processing resolution: dH=72 (288*0.25), dW=128 (512*0.25)
      # r1: stride-2  → ceil(72/2)=36,  ceil(128/2)=64
      # r2: stride-4  → ceil(72/4)=18,  ceil(128/4)=32
      # r3: stride-8  → ceil(72/8)=9,   ceil(128/8)=16
      # r4: stride-16 → ceil(72/16)=5,  ceil(128/16)=8  ← ceil matters here
      r1i: [1, 16, 36, 64]
      r2i: [1, 20, 18, 32]
      r3i: [1, 40,  9, 16]
      r4i: [1, 64,  5,  8]
