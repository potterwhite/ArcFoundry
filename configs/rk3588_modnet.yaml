project:
  name: "modnet-rk3588"
  output_dir: "./output/rk3588_release"
  workspace_dir: "./workspace/tmp"

target:
  platform: "rk3588"
  # device_id: null

build:
  # Optimization Level (0-3): Controls the aggressiveness of graph fusion.
  # 0: Off / Debug. No optimization. Compiles the graph "as-is". Highest stability for sensitive ops (Div/Softmax) but slowest speed.
  # 1: Safe. Enables only basic and safe fusions. Good starting point if the default level causes accuracy issues.
  # 2: Balanced. Standard optimizations suitable for most CV models.
  # 3: Aggressive (Default). Max performance. Complex operator fusion. May cause accuracy drop in Transformer/Conformer models due to aggressive merging.
  optimization_level: 2  # Suggest changing to 1 or 2 to fix the Div/Internal node issues
  verbose: true
  pruning: false
  eval_memory: false

  quantization:
    enabled: true                  # Enable INT8 quantization for 2-3x performance boost
    dtype: "asymmetric_quantized-8"
    dataset: "./data/calibration_list.txt"
    sampling_interval: 5           # Use every 5th sample from the dataset for calibration

models:
  - name: "modnet"
    path: "models/downloads/modnet_photographic_portrait_matting.onnx"
    url: "https://huggingface.co/PotterWhite/MODNet/resolve/main/modnet_photographic_portrait_matting.onnx"
    preprocess:
      fix_dynamic_shape: true
      simplify: false
      extract_metadata: true
      strict_override: false  # If true, will override all dimensions in the input shapes, even if they are not dynamic. Use with caution.
    normalization:
      mean_values: [[127.5, 127.5, 127.5]]
      std_values: [[127.5, 127.5, 127.5]]
    input_shapes:
      - [1, 3, 512, 512]  # Fixed 512x512 size for optimal NPU multi-core scheduling.
                          # Non-standard sizes like 512x896 cause multi-core scheduling failures,
                          # forcing layers to run on single core instead of 3-core parallel mode.
