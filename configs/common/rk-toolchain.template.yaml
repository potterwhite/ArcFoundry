# configs/common/rk-toolchain.template.yaml
#
# ============================================================================
#  Toolchain override template
# ============================================================================
#
#  WHY THIS FILE EXISTS
#  --------------------
#  Some Rockchip SDK versions (e.g. v2.4.0 for RV1126B) are distributed only
#  via partner / FTP channels, NOT via airockchip on GitHub. When you need
#  to use such a version, arc needs a way to point at a local .tgz file
#  without hardcoding the absolute path in the per-config yaml in `configs/`
#  — which would leak to the public github.com/potterwhite/ArcFoundry repo.
#
#  To prevent that leak:
#    - The configs/common/ directory is .gitignored EXCEPT for this template
#      and its accompanying .gitignore.
#    - This file is the ONLY file in configs/common/ that is git-controlled
#      (apart from .gitignore itself), and it is git-controlled only as a
#      SCHEMA / EXAMPLE. It is never read by arc at runtime (arc reads
#      `rk-toolchain.yaml`, not the template).
#    - The actual user config lives in `rk-toolchain.yaml` (a copy you
#      make and edit). `rk-toolchain.yaml` is gitignored.
#
#  HOW TO USE
#  ----------
#  1. Copy this template next to itself, dropping the `.template` segment:
#       cp configs/common/rk-toolchain.template.yaml \
#          configs/common/rk-toolchain.yaml
#
#  2. Edit the `rknn_toolkit2` fields in the COPY. Use an ABSOLUTE path.
#
#  3. arc auto-detects the copy at startup (via tools/load_toolchain_overrides.py
#     → load_merged_config). No further wiring needed.
#
#  4. (Optional) Override per-config in `configs/your_model.yaml`:
#       rknn_toolkit2:
#         tarball_path: /different/path/to/another.tgz
#     Per-config values take precedence over this common file.
#
#  FIELDS
#  ------
#  rknn_toolkit2:
#    tarball_path    Absolute path to a .tgz file containing an RKNN SDK.
#                    OMIT or leave empty to use the official airockchip
#                    repo at the pinned SHA (v2.3.2 by default).
#    tarball_sha256  SHA256 hash of the tarball. Strongly recommended to
#                    prevent silent corruption / wrong-file swaps. If
#                    omitted, arc prints a WARNING and proceeds without
#                    the integrity check.
#
#  VALIDATION ERRORS (arc will refuse to start with a clear message)
#  -----------------------------------------------------------------
#  - tarball_path is relative          → "must be an ABSOLUTE path"
#  - tarball_path file does not exist  → "not found: <path>"
#  - tarball_sha256 mismatch           → "SHA256 mismatch" with expected
#                                        vs actual, pointing at the file
#
#  EXAMPLE VALUES BELOW ARE PLACEHOLDERS — replace them with your own.
#  Do NOT commit rk-toolchain.yaml (it's gitignored).
#
# ============================================================================

rknn_toolkit2:
  # REPLACE: absolute path to the Rockchip-distributed .tgz on YOUR machine.
  # Examples of what the filename usually looks like:
  #   rknn-toolkit2-v2.4.0-2026-01-17-RV1126B.tgz
  #   rknn-toolkit2-v2.3.0-customer-2025-12-01.tgz
  tarball_path: /absolute/path/to/your/rknn-toolkit2-X.Y.Z-DATE-CHIP.tgz

  # REPLACE: `sha256sum /absolute/path/to/your/...tgz` and paste here.
  # 64 hex chars (0-9, a-f). Leave empty to skip integrity check (not recommended).
  tarball_sha256: replace_with_output_of_sha256sum_lowercase_hex_only
