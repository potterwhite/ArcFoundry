# Configuration: rv1126b_yolov5n_head_fp16_640x640
# Target SoC  : rv1126b
# Model       : yolov5n_head.onnx (single-class head detector, nc=1, anchors=3)
# Resolution  : 640x640 (baked into model)
# Precision   : fp16
#
# Created: 2026-07-07
#
# Source model details: see [[inspect-yolov5n-head-20260707]]
#   - producer : pytorch 2.4.1, opset 12, 146 nodes, 1.76M params
#   - input    : images [1, 3, 640, 640] FLOAT
#   - outputs  : output0 [1,18,80,80] / 273 [1,18,40,40] / 274 [1,18,20,20]
#   - 18 = (5 + nc=1) * 3 anchors → single-class detector
#   - graph is clean: no Slice/Reshape/Transpose/Cast, RV1126B friendly
#
# Notes:
#   - normalization [0,0,0]/[255,255,255] assumes uint8 input → [0,1] range
#     (matches yolov5 default letterbox + 1/255 pipeline)
#   - model.0.conv is a 6x6 stride-2 "focus" layer (yolov5s/n stem)
#   - INT8 not enabled yet — start with FP16 for quality baseline first

project:
  name: "rv1126b_yolov5n_head_fp16_640x640_20260707"
  output_dir: "./output/rv1126b_yolov5n_head_fp16_640x640_20260707_release"
  workspace_dir: "./workspace/tmp"

target:
  platform: "rv1126b"

build:
  optimization_level: 2
  verbose: true
  pruning: false
  eval_memory: false

  quantization:
    enabled: false          # FP16 baseline first
    dtype: "asymmetric_quantized-8"
    dataset: "./data/calibration_list.txt"
    sampling_interval: 5

models:
  - name: "yolov5n_head"
    path: "/development/src/ai/camera-auto-tracking/models/yolov5n_head.onnx"
    #path: "models/downloads/yolov5n_head.onnx"
    #url: "https://example.invalid/yolov5n_head.onnx"   # TODO: replace when public
    preprocess:
      fix_dynamic_shape:
        enabled: true
        strict_override: true
      fold_constant_inputs:
        enabled: false       # no scalar control inputs in this model
        inputs: {}
      graph_surgery:
        enabled: false       # 3 head outputs are already clean (output0 / 273 / 274)
        outputs:
          modify: []
      fix_int64_type: false
      simplify: true
      extract_metadata: true
    normalization:
      # yolov5 default: uint8 → /255 → [0, 1]
      # RKNN path: feed raw uint8, runtime applies mean/std automatically
      # ONNX path: feed pre-divided float32, frontend.cpp does NOT re-normalize
      mean_values: [[0, 0, 0]]
      std_values:  [[255, 255, 255]]
    input_shapes:
      images: [1, 3, 640, 640]

    postprocess:
      # Derived from output channel count: 18 = (5 + 1) * 3
      nc: 1
      anchors: 3
      strides: [8, 16, 32]   # 640/80, 640/40, 640/20